<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laudo Veterinário</title>

<style>

body{
    margin:0;
    background:#e9eef3;
    font-family: Arial, sans-serif;
    color:#1f2d3d;
}

/* PÁGINA */
.page{
    width:210mm;
    min-height:297mm;
    margin:10px auto;
    background:white;
    padding:12mm;
    box-sizing:border-box;
    box-shadow:0 4px 18px rgba(0,0,0,0.08);
    page-break-after:always;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* CABEÇALHO */
.header{
    border-bottom:1px solid #ddd;
    padding-bottom:6px;
    margin-bottom:10px;
}

.header h1{
    font-size:18px;
    margin:0;
}

.small{
    font-size:12px;
    color:#666;
}

/* CAMPOS */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    font-size:12px;
}

input,select,textarea{
    width:100%;
    padding:6px;
    font-size:12px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* IMAGENS */
.image-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}

.image-grid img{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:6px;
}

/* ODONTOGRAMA */
.tooth{
    width:38px;
    height:38px;
    border:1px solid #999;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:10px;
    border-radius:6px;
}

.tooth.selected{background:#4caf50;color:white;}
.tooth.alert{background:#e53935;color:white;}
.tooth.extracted{background:#777;color:white;}

.row{display:flex;gap:6px;align-items:center;margin-bottom:4px;}
.row-title{width:120px;font-size:11px;font-weight:bold;}

/* LAUDO */
#laudo{
    border:1px solid #ddd;
    padding:10px;
    min-height:300px;
    font-size:13px;
    line-height:1.35;
    white-space:pre-line;
}

/* PRINT */
@media print{
    body{background:white;}
    .page{box-shadow:none;margin:0;}
}

button{
    padding:8px 12px;
    border:none;
    background:#1565c0;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- PÁGINA 1 -->
<div class="page">

<div class="header">
<h1>Laudo Radiográfico Odontológico Veterinário</h1>
<div class="small">Radiologia Veterinária</div>
</div>

<div class="grid">
<input placeholder="Paciente">
<input placeholder="Tutor">
<input placeholder="Espécie">
<input placeholder="Raça">
<input placeholder="Idade">
<input placeholder="Peso">
<input type="date">
<input placeholder="Procedimento">
</div>

<h3>Imagens Radiográficas</h3>
<div class="image-grid" id="imgGrid"></div>

<h3>Odontograma</h3>
<div id="odontograma"></div>

</div>

<!-- PÁGINA 2 -->
<div class="page" id="page2">

<h3>Imagens adicionais</h3>
<div class="image-grid" id="imgGrid2"></div>

</div>

<!-- PÁGINA 3 -->
<div class="page">

<h3>Laudo Radiográfico</h3>
<div id="laudo" contenteditable="true"></div>

<h3>Assinatura</h3>
<input placeholder="Nome">
<input placeholder="CRMV">

<button onclick="montarLaudo()">Atualizar Laudo</button>
<button onclick="window.print()">Imprimir</button>

</div>

<script>

let alteracoes = [];

function adicionarAlteracao(dente,tipo){
    alteracoes.push({dente,tipo});
    montarLaudo();
}

function agrupar(){
    let g = {};
    alteracoes.forEach(a=>{
        if(!g[a.tipo]) g[a.tipo]=[];
        if(!g[a.tipo].includes(a.dente)) g[a.tipo].push(a.dente);
    });
    return g;
}

function montarLaudo(){

let grupos = agrupar();

let elementos = "Sem alterações estruturais evidentes.";
let ligamento = "Lâmina dura preservada.";
let osso = "Osso alveolar preservado.";
let furca = "Sem alterações.";
let impressao = "Sem alterações significativas.";

if(grupos.periodontal){
let d = grupos.periodontal.join(", ");
ligamento = `Alterações periodontais em ${d}.`;
osso = `Perda óssea em ${d}.`;
impressao = `Doença periodontal em ${d}.`;
}

if(grupos.furca){
let d = grupos.furca.join(", ");
furca = `Comprometimento de furca em ${d}.`;
impressao = `Envolvimento de furca em ${d}.`;
}

if(grupos.lesao_coroa){
let d = grupos.lesao_coroa.join(", ");
elementos = `Reabsorção coronária em ${d}.`;
impressao = `Reabsorção dentária em ${d}.`;
}

document.getElementById("laudo").innerText = `
ELEMENTOS DENTÁRIOS
${elementos}

LIGAMENTO PERIODONTAL
${ligamento}

OSSO ALVEOLAR
${osso}

FURCA
${furca}

IMPRESSÃO DIAGNÓSTICA
${impressao}
`;

}

function renderTeeth(){

let container = document.getElementById("odontograma");
container.innerHTML="";

let dentes = [["Maxila",[101,102,103,104,105,106,107,108]]];

dentes.forEach(g=>{
let row=document.createElement("div");
row.className="row";

let title=document.createElement("div");
title.className="row-title";
title.innerText=g[0];
row.appendChild(title);

g[1].forEach(d=>{
let t=document.createElement("div");
t.className="tooth";
t.innerText=d;

t.onclick=()=>{
adicionarAlteracao(d,"periodontal");
t.classList.add("selected");
};

row.appendChild(t);
});

container.appendChild(row);
});

}

renderTeeth();
montarLaudo();

</script>

</body>
</html>
